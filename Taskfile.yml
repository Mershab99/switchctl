version: "3"

dotenv: [".env"]

vars:
  VENV: venv
  PYTHON: "{{.VENV}}/bin/python3"
  PIP: "{{.VENV}}/bin/pip"
  CONFIG: config/switch.yaml

tasks:
  setup:
    desc: Create virtualenv and install dependencies
    cmds:
      - python3 -m venv {{.VENV}}
      - "{{.PIP}} install -r requirements.txt"
    sources:
      - requirements.txt
    generates:
      - "{{.VENV}}/pyvenv.cfg"

  dev:
    desc: Run web UI in dev mode (mock switch, auto-reload)
    deps: [setup]
    env:
      MOCK_SWITCH: "1"
    cmds:
      - "{{.VENV}}/bin/uvicorn app.web.main:app --reload --port {{.PORT | default 8000}}"

  deploy:
    desc: Run web UI in production mode
    deps: [setup]
    cmds:
      - "{{.VENV}}/bin/uvicorn app.web.main:app --host {{.HOST | default \"0.0.0.0\"}} --port {{.PORT | default 8000}} --workers {{.WORKERS | default 1}}"

  status:
    desc: Show switch status (mock mode)
    deps: [setup]
    env:
      MOCK_SWITCH: "1"
    cmds:
      - "{{.PYTHON}} cli.py status --config {{.CONFIG}}"

  diff:
    desc: Show config diff (mock mode)
    deps: [setup]
    env:
      MOCK_SWITCH: "1"
    cmds:
      - "{{.PYTHON}} cli.py diff --config {{.CONFIG}}"

  apply:
    desc: Apply config changes (mock mode)
    deps: [setup]
    env:
      MOCK_SWITCH: "1"
    cmds:
      - "{{.PYTHON}} cli.py apply --config {{.CONFIG}}"

  test:
    desc: Run tests
    deps: [setup]
    cmds:
      - "{{.VENV}}/bin/pytest {{.CLI_ARGS}}"

  clean:
    desc: Remove virtualenv and caches
    cmds:
      - rm -rf {{.VENV}} __pycache__ .pytest_cache
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
